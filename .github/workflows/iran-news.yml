name: Iran News Daily

on:
  schedule:
    - cron: "7 22 * * *"   # JST 07:07
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare output folders
        run: |
          mkdir -p data
          mkdir -p reports
          mkdir -p web/data

      - name: Run app
        run: python app.py

      - name: Run analysis
        run: python analysis.py

      - name: Copy JSON for web
        run: |
          cp data/iran_news.json web/data/iran_news.json
          cp data/daily_summary.json web/data/daily_summary.json

      - name: Show generated files
        run: |
          ls -la
          ls -la data || true
          ls -la reports || true
          ls -la web/data || true

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add data/iran_news.json
          git add data/iran_news.csv
          git add data/daily_summary.json
          git add data/yesterday_summary.json
          git add reports/iran_report.md
          git add web/data/iran_news.json
          git add web/data/daily_summary.json

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "update latest news"
          git push
