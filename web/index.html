<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日のイラン情勢</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="container">
    <header class="hero">
      <p class="eyebrow">DAILY BRIEF</p>
      <h1>今日のイラン情勢</h1>
      <p class="subtext">毎日読む用の要点まとめ</p>

      <div class="hero-badges">
        <div id="dateBadge" class="date-badge">更新日: 読み込み中...</div>
        <div id="timeBadge" class="time-badge">最終更新: -</div>
      </div>
    </header>

    <main>
      <section class="card summary-card gradient-card">
        <div class="section-title-row">
          <h2>全体まとめ</h2>
          <span class="mini-chip chip-summary">SUMMARY</span>
        </div>
        <p id="headlineSummary">読み込み中...</p>
      </section>

      <section class="grid two-col">
        <div class="card accent-card topics-card">
          <div class="section-title-row">
            <h2>重要トピック</h2>
            <span class="mini-chip chip-topic">TOPICS</span>
          </div>
          <div id="topTopics" class="stack"></div>
        </div>

        <div class="card accent-card impact-card">
          <div class="section-title-row">
            <h2>日本への影響</h2>
            <span class="mini-chip chip-impact">JAPAN</span>
          </div>
          <ul id="impactList" class="clean-list"></ul>
        </div>
      </section>

      <section class="card accent-card watch-card">
        <div class="section-title-row">
          <h2>次に注目</h2>
          <span class="mini-chip chip-watch">WATCH</span>
        </div>
        <ul id="watchNextList" class="clean-list"></ul>
      </section>

      <section class="card news-section-card">
        <div class="section-head">
          <div class="section-title-row">
            <h2>記事一覧</h2>
            <span class="mini-chip chip-news">NEWS</span>
          </div>

          <div class="controls">
            <select id="categoryFilter">
              <option value="all">すべて</option>
            </select>
          </div>
        </div>

        <div id="newsList" class="news-list"></div>
      </section>
    </main>
  </div>

  <template id="topicTemplate">
    <article class="topic-item">
      <div class="topic-icon-wrap">
        <span class="topic-icon">●</span>
      </div>
      <div class="topic-content">
        <h3></h3>
        <p></p>
      </div>
    </article>
  </template>

  <template id="newsCardTemplate">
    <article class="news-card">
      <div class="news-meta">
        <span class="chip source"></span>
        <span class="chip category"></span>
        <span class="chip importance"></span>
      </div>
      <h3 class="news-title"></h3>
      <p class="news-summary"></p>
      <a class="news-link" target="_blank" rel="noopener noreferrer">元記事を開く</a>
    </article>
  </template>

  <script src="./script.js"></script>
</body>
</html>
