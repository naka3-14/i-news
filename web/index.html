<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日のイラン情勢</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="topline"></div>

  <header class="site-header">
    <div class="container header-inner">
      <div>
        <p class="site-kicker">MIDDLE EAST MONITOR</p>
        <h1 class="site-title">今日のイラン情勢</h1>
        <p class="site-desc">ニュースソースとAI分析を分けて表示</p>
      </div>

      <div class="header-status">
        <div class="status-row">
          <span class="status-label">更新日</span>
          <span id="dateBadge" class="status-value">読み込み中...</span>
        </div>
        <div class="status-row">
          <span class="status-label">最終更新</span>
          <span id="timeBadge" class="status-value">-</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container main-layout">
    <section class="lead-panel">
      <div class="section-bar">
        <span class="section-bar-label urgent">AI分析</span>
        <h2>全体まとめ</h2>
      </div>
      <p id="headlineSummary" class="lead-text">読み込み中...</p>
    </section>

    <section class="content-grid">
      <div class="main-column">
        <section class="news-block">
          <div class="section-bar">
            <span class="section-bar-label orange">差分</span>
            <h2>昨日との差分</h2>
          </div>

          <div class="diff-grid">
            <div class="diff-card diff-new">
              <h3>新しく出てきた話題</h3>
              <ul id="diffNew" class="bullet-list"></ul>
            </div>

            <div class="diff-card diff-removed">
              <h3>消えた話題</h3>
              <ul id="diffRemoved" class="bullet-list"></ul>
            </div>
          </div>
        </section>

        <section class="news-block">
          <div class="section-bar">
            <span class="section-bar-label red">AI分析</span>
            <h2>重要トピック</h2>
          </div>
          <div id="topTopics" class="topic-list"></div>
        </section>

        <section class="news-block">
          <div class="section-bar">
            <span class="section-bar-label blue">ニュースソース</span>
            <h2>記事一覧</h2>
          </div>

          <div class="toolbar">
            <label for="categoryFilter">カテゴリ</label>
            <select id="categoryFilter">
              <option value="all">すべて</option>
            </select>
          </div>

          <div id="newsList" class="article-list"></div>
        </section>
      </div>

      <aside class="side-column">
        <section class="side-block">
          <div class="section-bar compact">
            <span class="section-bar-label gold">AI分析</span>
            <h2>日本への影響</h2>
          </div>
          <ul id="impactList" class="bullet-list"></ul>
        </section>

        <section class="side-block forecast-block">
          <div class="section-bar compact">
            <span class="section-bar-label green">AI予想</span>
            <h2>今後の見通し</h2>
          </div>
          <ul id="forecastList" class="bullet-list"></ul>
        </section>
      </aside>
    </section>
  </main>

  <template id="topicTemplate">
    <article class="topic-row">
      <div class="topic-row-head">
        <span class="topic-rank">1</span>
        <h3></h3>
      </div>
      <p></p>
    </article>
  </template>

  <template id="newsCardTemplate">
    <article class="article-row">
      <div class="article-meta">
        <span class="meta-chip source"></span>
        <span class="meta-chip category"></span>
        <span class="meta-chip importance"></span>
      </div>
      <h3 class="article-title"></h3>
      <p class="article-summary"></p>
      <a class="article-link" target="_blank" rel="noopener noreferrer">元記事を開く</a>
    </article>
  </template>

  <script src="./script.js"></script>
</body>
</html>
